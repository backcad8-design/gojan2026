function App() {
  const [step, setStep] = useState(0);
  const [selectedTrack, setSelectedTrack] = useState(null);
  const [userName, setUserName] = useState('');
  const [grade, setGrade] = useState('');
  const [studentId, setStudentId] = useState('');
  const [interests, setInterests] = useState({});
  const [currentPromptIdx, setCurrentPromptIdx] = useState(-1);
  const [copySuccess, setCopySuccess] = useState(null);
  const [completedSteps, setCompletedSteps] = useState([]);
  const [customQuestions, setCustomQuestions] = useState({});
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) {
        scrollRef.current.scrollTop = 0;
    }
  }, [step, currentPromptIdx]);

  const currentInterest = selectedTrack ? (interests[selectedTrack.id] || '') : '';

  const copyToClipboard = (text) => {
    if (!text || !text.trim()) return;
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    setCopySuccess(true);
    setTimeout(() => setCopySuccess(null), 2000);
  };

  const getPersonaPrompt = () => {
    return `안녕! 나는 오늘 너와 함께 ${selectedTrack?.title || '학습'} 탐구를 진행할 고등학교 ${grade || 'N'}학년 학생 ${userName || '무명'}이야. 오늘 나는 단순히 정답을 얻는 게 아니라, 너와 깊이 있는 대화를 하며 나만의 생각을 정리하고 싶어. 대신 절대 너무 어려운 내용은 다루지는 말고 고등학생이 이해할 만한 수준으로 대화를 이끌어 줬으면 좋겠어. 그리고 하지 않은 행동에 대해 거짓으로 작성하지 말아줘. 준비됐니?`;
  };

  const getFinalPrompt = () => {
    return `방금 대화를 바탕으로 학교생활기록부 '개별 세부능력 및 특기사항'에 들어갈 초안을 아래 조건을 참고해서 작성해 줘.
포함할 내용: (1) 이 활동을 시작한 이유 (2) AI와 대화하면서 AI의 답변을 그대로 믿지 않고 내가 직접 고민하고 수정한 과정 (3) 활동 후 내가 얼마나 성장했는지.
길이: 공백 포함 300자 정도.
규칙: '매우 잘함', '열심히 함' 같은 칭찬보다는 내가 어떤 행동을 했고 어떤 생각을 했는지 구체적으로 써줘. 말투는 '~함', '~임'으로 끝내줘. 너무 전문적이거나 어려운 용어로 서술하지 말고 고등학교 수준의 내용으로 풀어서 작성. 첫 문장은 '질문의 힘: AI와 함께하는 성장 다이어리(2026.07.07.) 활동에서' 로 시작해줘.`;
  };

  const handleNextStep = () => {
    if (selectedTrack && currentPromptIdx < selectedTrack.prompts.length - 1) {
        if (!completedSteps.includes(currentPromptIdx)) {
            setCompletedSteps([...completedSteps, currentPromptIdx]);
        }
        setCurrentPromptIdx(prev => prev + 1);
    } else {
        setStep(5);
    }
  };

  const handlePrevStep = () => {
    if (currentPromptIdx > -1) {
        setCurrentPromptIdx(prev => prev - 1);
    } else {
        setStep(3);
    }
  };

  const handleRestart = () => {
    setStep(0);
    setSelectedTrack(null);
    setCurrentPromptIdx(-1);
    setCompletedSteps([]);
  };

  const goToHome = () => {
    setStep(0);
  };

  const isRequiredStep =
    currentPromptIdx === -1 ||
    (selectedTrack?.id !== 'career' && currentPromptIdx === 0) ||
    currentPromptIdx === 9;

  const questionKey = selectedTrack ? `${selectedTrack.id}_${currentPromptIdx}` : '';

  return (
    <div className="min-h-screen bg-slate-100 font-sans text-slate-900 flex flex-col overflow-hidden">
      {/* Header */}
      <header className="h-20 bg-white border-b-2 border-slate-200 flex items-center justify-between px-10 shrink-0 sticky top-0 z-50">
        <div className="flex items-center gap-4">
          <button
            onClick={goToHome}
            className="p-3 hover:bg-slate-100 rounded-2xl transition-all text-slate-500 hover:text-indigo-600 active:scale-95"
            title="처음으로 이동"
          >
            <Home className="w-6 h-6" />
          </button>
        
          <div className="flex items-center gap-3">
            <span className="font-black text-2xl tracking-tighter text-slate-900 underline decoration-indigo-500 decoration-4 underline-offset-4">
              질문의 힘: AI와 함께하는 성장 다이어리
            </span>
          </div>
        </div>
      
        <div className="flex items-center gap-8 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">
          {step > 0 && step < 6 && (
            <div className="hidden md:flex items-center gap-4">
              <span className={step >= 1 ? 'text-indigo-600' : ''}>Login</span>
              <ChevronRight className="w-3 h-3" />
              <span className={step >= 2 ? 'text-indigo-600' : ''}>Track</span>
              <ChevronRight className="w-3 h-3" />
              <span className={step >= 3 ? 'text-indigo-600' : ''}>Persona</span>
              <ChevronRight className="w-3 h-3" />
              <span className={step >= 4 ? 'text-indigo-600' : ''}>Guide</span>
              <ChevronRight className="w-3 h-3" />
              <span className={step >= 6 ? 'text-indigo-600' : ''}>Submit</span>
            </div>
          )}
          <div className="h-8 w-px bg-slate-300 mx-2" />
          <div className="flex items-center gap-3 normal-case tracking-normal">
            <div className="text-right">
                <p className="text-[10px] font-black text-slate-500 leading-none uppercase tracking-widest">Student</p>
                <p className="text-sm font-black text-slate-800">{userName ? `${userName} (${studentId || '학번미입력'})` : 'Guest'}</p>
            </div>
            <div className="w-10 h-10 bg-slate-200 rounded-full flex items-center justify-center border-2 border-white shadow-md overflow-hidden">
                <User className="w-5 h-5 text-slate-500" />
            </div>
          </div>
        </div>
      </header>

      {/* Main Content Area */}
      <main className="flex-1 overflow-hidden relative flex flex-col">
        {/* STEP 0: Intro */}
        {step === 0 && (
          <div className="flex-1 flex flex-col items-center justify-center text-center p-12 space-y-12 bg-white overflow-y-auto">
            <div className="p-8 bg-indigo-600 rounded-[3rem] shadow-2xl animate-bounce">
              <Sparkles className="w-20 h-20 text-white" />
            </div>
            <div className="space-y-4">
              <h1 className="text-7xl font-black text-slate-900 tracking-tight leading-tight italic uppercase drop-shadow-sm">AI와 탐구하기</h1>
              <p className="text-2xl text-slate-600 max-w-3xl leading-relaxed mx-auto font-semibold">
                생성형 인공지능과 깊이 있는 대화를 통해<br />
                학술적 호기심, 진로 역량, 공부 습관(3가지 트랙)을 탐구해보세요.
              </p>
            </div>
            <div className="bg-slate-50 border-2 border-slate-200 p-12 rounded-[4rem] max-w-3xl text-left space-y-8 shadow-xl">
              <h4 className="text-3xl font-black text-slate-900 flex items-center gap-4">
                  <Info className="w-10 h-10 text-indigo-600" /> 이용 방법 안내
              </h4>
              <ol className="text-2xl text-slate-800 space-y-6 list-decimal list-inside leading-relaxed font-bold">
                  <li>생성형 인공지능 사이트에 <span className="text-indigo-600 underline decoration-indigo-200 underline-offset-4">접속하여 로그인 </span>을 합니다.</li>
                  <li>3가지 트랙중 관심있는 <span className="text-indigo-600 underline decoration-indigo-200 underline-offset-4">탐구 트랙 </span>1개를 선택합니다.</li>
                  <li>인공지능에게 나를 알려주기 위해 <span className="text-indigo-600 underline decoration-indigo-200 underline-offset-4"> 정보</span>를 입력합니다.</li>
                  <li>질문을 작성하고 <span className="text-indigo-600 underline decoration-indigo-200 underline-offset-4">복사</span>하여 인공지능 대화창에 붙여넣어 대화합니다.</li>
                  <li>10개 질문 후, <span className="text-indigo-600 underline decoration-indigo-200 underline-offset-4"> 1000자 대화 내용 요약과 느낌점</span>을 제출합니다.</li>
                  <li>1000자 대화 요약본으로 <span className="text-indigo-600 underline decoration-indigo-200 underline-offset-4"> 인포그래픽를 만들고 </span>제출합니다.</li>
                  <li>준비가 되었다면 <span className="text-indigo-600 underline decoration-indigo-200 underline-offset-4">성장 로드맵 시작하기 버튼</span>을 눌러 시작하세요.</li>
              </ol>
            </div>
            <button
              onClick={() => setStep(1)}
              className="px-20 py-8 bg-indigo-600 text-white rounded-[2.5rem] font-black text-3xl hover:bg-indigo-700 transition-all shadow-2xl shadow-indigo-300 hover:-translate-y-2 active:scale-95"
            >
              성장 로드맵 시작하기
            </button>
          </div>
        )}

        {/* STEP 1: Gemini Login Check */}
        {step === 1 && (
          <div className="flex-1 flex flex-col items-center justify-center p-8 space-y-10 overflow-y-auto bg-slate-50 animate-in fade-in duration-500">
            <div className="text-center space-y-6 max-2xl">
              <div className="w-28 h-28 bg-white border-4 border-indigo-600 rounded-[2.5rem] flex items-center justify-center mx-auto mb-6 shadow-2xl">
                <LogIn className="w-14 h-14 text-indigo-600" />
              </div>
              <h2 className="text-6xl font-black text-slate-900 tracking-tight leading-tight">인공지능 사이트를 열고<br />로그인 해주세요.</h2>
              <p className="text-2xl text-slate-700 font-bold leading-relaxed">
                탐구 활동을 위해 새로운 창에서<br />
                <span className="text-indigo-600">인공지능 사이트</span>에 로그인이 되어 있어야 합니다.
              </p>
            </div>
          
            <div className="flex flex-col sm:flex-row gap-8 w-full max-w-2xl">
              <a
                href="https://www.ieumai.com/"
                target="_blank"
                rel="noreferrer"
                className="flex-1 py-7 bg-white border-4 border-slate-900 text-slate-900 rounded-[2rem] font-black text-2xl flex items-center justify-center gap-4 hover:bg-slate-100 transition-all shadow-xl"
              >
                인공지능 사이트 열기 <ExternalLink className="w-8 h-8" />
              </a>
              <button
                onClick={() => setStep(2)}
                className="flex-1 py-7 bg-indigo-600 text-white rounded-[2rem] font-black text-2xl flex items-center justify-center gap-4 hover:bg-indigo-700 transition-all shadow-2xl shadow-indigo-300 active:scale-95"
              >
                준비 완료 <ChevronRight className="w-8 h-8" />
              </button>
            </div>
          
            <button onClick={() => setStep(0)} className="text-slate-500 font-black text-lg hover:text-slate-800 transition-colors underline underline-offset-8">
              처음으로 돌아가기
            </button>
          </div>
        )}

        {/* STEP 2: Track Select */}
        {step === 2 && (
          <div className="flex-1 flex flex-col items-center justify-center p-8 space-y-12 overflow-y-auto bg-slate-100 animate-in fade-in duration-500">
            <div className="text-center space-y-4 max-w-4xl">
              <h2 className="text-6xl font-black text-slate-900 tracking-tight leading-tight">어떤 방향으로 탐구해볼까요?</h2>
              <p className="text-2xl text-slate-600 font-bold leading-relaxed">나의 관심사에 가장 잘 맞는 트랙을 선택하여 깊이 있는 대화를 시작해보세요.</p>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-10 w-full max-w-7xl px-4">
              {TRACKS.map(track => (
                <button
                  key={track.id}
                  onClick={() => { setSelectedTrack(track); setStep(3); }}
                  className="group flex flex-col p-12 bg-white border-2 border-slate-200 rounded-[4rem] text-left hover:border-indigo-600 hover:shadow-[0_40px_80px_-15px_rgba(79,70,229,0.2)] transition-all relative overflow-hidden active:scale-[0.98]"
                >
                  <div className="absolute top-0 right-0 w-40 h-40 bg-indigo-50 rounded-bl-full opacity-0 group-hover:opacity-100 transition-opacity" />
                  <div className="p-8 bg-indigo-50 text-indigo-600 rounded-[2rem] group-hover:bg-indigo-600 group-hover:text-white transition-all mb-10 w-fit shadow-md relative z-10">
                    {track.icon}
                  </div>
                  <h3 className="text-4xl font-black text-slate-900 mb-5 tracking-tight group-hover:text-indigo-700 transition-colors relative z-10">{track.title}</h3>
                  <p className="text-xl text-slate-600 leading-relaxed group-hover:text-slate-900 transition-colors relative z-10 font-bold">{track.description}</p>
                  <div className="mt-12 flex items-center text-indigo-600 font-black text-2xl group-hover:translate-x-5 transition-transform relative z-10">
                    탐구 시작하기 <ChevronRight className="w-8 h-8 ml-3" />
                  </div>
                </button>
              ))}
            </div>
            <button onClick={() => setStep(1)} className="text-slate-500 font-black text-lg hover:text-slate-800 transition-colors">이전 단계로</button>
          </div>
        )}

        {/* STEP 3: Persona Setup */}
        {step === 3 && (
          <div className="flex-1 flex flex-col items-center justify-center p-8 max-w-4xl mx-auto space-y-12 overflow-y-auto w-full animate-in fade-in duration-500">
            <div className="w-full text-center space-y-3">
              <h2 className="text-5xl font-black text-slate-900 tracking-tight">나의 정보</h2>
              <p className="text-slate-600 text-2xl font-bold italic whitespace-nowrap">
                나에게 꼭 맞는 가이드 만들기 위해 정보를 입력해 주세요.
              </p>
            </div>
            <div className="w-full max-w-2xl mx-auto space-y-10 bg-white p-12 rounded-[4rem] border-4 border-slate-200 shadow-2xl">
              <div className="grid grid-cols-2 gap-8">
                  <div className="space-y-4">
                    <label className="text-sm font-black text-indigo-600 uppercase tracking-widest block pl-2">이름</label>
                    <input
                      type="text" value={userName} onChange={(e) => setUserName(e.target.value)}
                      className={`w-full p-6 border-4 rounded-[1.5rem] outline-none transition-all text-xl font-black ${userName ? 'border-slate-100 bg-slate-50 text-slate-900' : 'border-indigo-100 bg-white'}`}
                      placeholder="이름"
                    />
                  </div>
                  <div className="space-y-4">
                    <label className="text-sm font-black text-indigo-600 uppercase tracking-widest block pl-2">학번</label>
                    <input
                      type="text" value={studentId} onChange={(e) => setStudentId(e.target.value)}
                      className={`w-full p-6 border-4 rounded-[1.5rem] outline-none transition-all text-xl font-black ${studentId ? 'border-slate-100 bg-slate-50 text-slate-900' : 'border-indigo-100 bg-white'}`}
                      placeholder="예: 10101"
                    />
                  </div>
              </div>
              <div className="space-y-4">
                <label className="text-sm font-black text-indigo-600 uppercase tracking-widest block pl-2">학년</label>
                <input
                  type="number" value={grade} onChange={(e) => setGrade(e.target.value)}
                  className={`w-full p-6 border-4 rounded-[1.5rem] outline-none transition-all text-xl font-black ${grade ? 'border-slate-100 bg-slate-50 text-slate-900' : 'border-indigo-100 bg-white'}`}
                  placeholder="현재 학년 (예: 1)"
                />
              </div>
              <div className="space-y-4">
                <label className="text-sm font-black text-indigo-600 uppercase tracking-widest block pl-2">
                  {selectedTrack?.id === 'reflection' ? '나의 공부 습관(하는 습관 으로 끝맺음)' : selectedTrack?.id === 'career' ? '관심 전공' : '탐구하고 싶은 사회 문제'}
                </label>
                <textarea
                  value={interests[selectedTrack.id] || ''} 
                  onChange={(e) => setInterests(prev => ({ ...prev, [selectedTrack.id]: e.target.value }))}
                  className={`w-full p-6 border-4 rounded-[2rem] outline-none transition-all h-40 resize-none text-xl font-black leading-relaxed ${interests[selectedTrack.id] ? 'border-slate-100 bg-slate-50 text-slate-900' : 'border-indigo-100 bg-white'}`}
                  placeholder={selectedTrack?.id === 'reflection' ? "예: 계획만 짜고 실천하지 않는 습관" : selectedTrack?.id === 'career' ? "컴퓨터공학, 생명공학, 간호, 경영, 실용 음악 등" : "예: 지방 소멸 문제 등"}
                />
              </div>
            </div>
            <div className="flex gap-8 w-full max-w-2xl">
              <button onClick={() => setStep(2)} className="flex-1 p-6 text-slate-500 font-black text-xl hover:text-slate-800 transition-colors">뒤로가기</button>
              <button
                disabled={!userName || !grade || !(interests[selectedTrack.id] || '').trim() || !studentId}
                onClick={() => setStep(4)}
                className="flex-[2] p-7 bg-indigo-600 text-white rounded-[2rem] font-black text-2xl hover:bg-indigo-700 transition-all disabled:opacity-20 shadow-2xl shadow-indigo-200 active:scale-95"
              >
                가이드 생성 완료
              </button>
            </div>
          </div>
        )}

        {/* STEP 4: Guide Loop */}
        {step === 4 && selectedTrack && (
          <div className="flex-1 flex bg-white overflow-hidden animate-in fade-in duration-500">
            <aside className="w-96 border-r-4 border-slate-100 bg-slate-50 flex flex-col shrink-0 shadow-inner overflow-hidden">
              <div className="p-10 border-b-4 border-slate-100 bg-white">
                <div className="flex items-center gap-4 text-indigo-700 font-black mb-2">
                  <div className="p-3 bg-indigo-100 rounded-2xl">{selectedTrack.icon}</div>
                  <span className="text-2xl uppercase tracking-tighter">{selectedTrack.title} 트랙</span>
                </div>
                <div className="h-3 w-full bg-slate-200 rounded-full overflow-hidden mt-8 shadow-inner">
                  <div
                    className="h-full bg-indigo-600 transition-all duration-700 shadow-[0_0_10px_rgba(79,70,229,0.5)]"
                    style={{ width: `${((currentPromptIdx + 2) / (selectedTrack.prompts.length + 1)) * 100}%` }}
                  />
                </div>
                <div className="text-xs font-black text-slate-500 mt-4 flex justify-between tracking-[0.2em]">
                  <span>PROGRESS</span>
                  <span className="text-indigo-600 text-lg leading-none">{currentPromptIdx === -1 ? 0 : currentPromptIdx + 1} / {selectedTrack.prompts.length}</span>
                </div>
              </div>
            
              <nav className="flex-1 overflow-y-auto p-6 space-y-3">
                <div
                  className={`w-full flex items-center gap-5 p-5 rounded-[1.5rem] text-lg transition-all ${
                    currentPromptIdx === -1 
                      ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-200 font-black ring-4 ring-indigo-100' 
                      : 'text-slate-500 border-2 border-transparent'
                  }`}
                >
                  <div className={`w-8 h-8 rounded-xl flex items-center justify-center border-2 font-black text-xs ${
                    currentPromptIdx > -1 ? 'bg-indigo-100 border-indigo-200 text-indigo-700' :
                    currentPromptIdx === -1 ? 'bg-white text-indigo-600 border-white' : 'border-slate-300'
                  }`}>
                    {currentPromptIdx > -1 ? <CheckCircle2 className="w-5 h-5" /> : 'P'}
                  </div>
                  <span className="truncate">나의 정보 알려주기 (필수)</span>
                </div>

                {selectedTrack.prompts.map((p, i) => {
                  const isThisStepRequired = i === 9 || (selectedTrack.id !== 'career' && i === 0);
                  const isCurrent = i === currentPromptIdx;
                  const isCompleted = i < currentPromptIdx;

                  return (
                    <div
                      key={p.id}
                      className={`w-full flex items-center gap-5 p-5 rounded-[1.5rem] text-lg transition-all ${
                        isCurrent 
                          ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-200 font-black ring-4 ring-indigo-100' 
                          : isCompleted ? 'text-slate-700 bg-white shadow-sm border-2 border-indigo-100 font-bold' : 'text-slate-400 border-2 border-transparent font-bold'
                      }`}
                    >
                      <div className={`w-8 h-8 rounded-xl flex items-center justify-center border-2 font-black text-xs ${
                        isCompleted ? 'bg-indigo-50 border-indigo-100 text-indigo-600' :
                        isCurrent ? 'bg-white text-indigo-600 border-white' : 'border-slate-200'
                      }`}>
                        {isCompleted ? <CheckCircle2 className="w-5 h-5" /> : p.id}
                      </div>
                      <span className="truncate">
                        {p.title} {isThisStepRequired ? '(필수)' : '(예시)'}
                      </span>
                    </div>
                  )
                })}
              </nav>
            </aside>

            <section ref={scrollRef} className="flex-1 flex flex-col p-16 overflow-y-auto items-center bg-slate-100">
                <div className="max-w-4xl w-full space-y-12 animate-in fade-in slide-in-from-bottom-8 duration-500">
                    <div className="space-y-4">
                        <div className="flex items-center gap-4 text-indigo-600 font-black text-sm tracking-[0.3em] uppercase">
                            <span className="px-5 py-2 bg-indigo-600 text-white rounded-full shadow-lg">Step {currentPromptIdx === -1 ? 'Persona' : currentPromptIdx + 1}</span>
                            <span className="text-slate-500">{isRequiredStep ? "Essential Mission" : "Advanced Explorer"}</span>
                        </div>
                        <h2 className="text-6xl font-black text-slate-900 tracking-tight leading-tight">
                            {currentPromptIdx === -1 ? "필수 미션: 나의 정보 알려주기" : `${selectedTrack.prompts[currentPromptIdx].title}${isRequiredStep ? ' (필수)' : ' (예시)'}`}
                        </h2>
                    </div>

                    <div className="bg-white border-4 border-slate-200 rounded-[4rem] p-16 shadow-2xl space-y-12 relative overflow-hidden">
                        <div className="space-y-8 relative z-10">
                            <div className="flex items-center gap-3 text-slate-500 font-black text-xs tracking-widest uppercase">
                                <Copy className="w-5 h-5" /> {isRequiredStep ? "Copy this Prompt" : "Reference Example"}
                            </div>
                            <div className="p-12 bg-slate-50 rounded-[3rem] border-4 border-dashed border-indigo-200 text-3xl text-slate-800 leading-relaxed font-bold italic shadow-inner">
                                "{currentPromptIdx === -1 ? getPersonaPrompt() : selectedTrack.prompts[currentPromptIdx].text(interests[selectedTrack.id] || '')}"
                            </div>

                            {!isRequiredStep && (
                              <div className="space-y-6 pt-10 border-t-4 border-slate-50">
                                <div className="flex items-center gap-3 text-indigo-600 font-black text-sm tracking-widest uppercase">
                                    <Edit3 className="w-8 h-8" /> 신중하게 나만의 질문으로 다듬어보세요!!! (권장)
                                </div>
                                <textarea
                                  value={customQuestions[questionKey] || ''} 
                                  onChange={(e) => setCustomQuestions(prev => ({ ...prev, [questionKey]: e.target.value }))}
                                  className="w-full p-8 bg-white border-4 border-indigo-600 rounded-[2.5rem] text-2xl text-slate-900 font-black outline-none focus:ring-8 focus:ring-indigo-100 transition-all min-h-[220px] resize-none shadow-xl"
                                  placeholder={currentPromptIdx === 0 && selectedTrack.id === 'career'
                                    ? "예: 나는 인공지능 전문가를 꿈꾸고 있어. 고등학교 [정보] 교과에서 배운 [기계학습] 개념이 대학교 전공 수업에서는 얼마나 더 깊게 쓰이는지 알려줘."
                                    : "위 예시를 참고하거나 인공지능 추천 꼬리질문이나 나만의 질문을 작성하고 아래 질문 복사 버튼을 누르세요. 복사된 내용은 인공지능에 붙여넣으세요 "}
                                />
                              </div>
                            )}
                        </div>

                        <div className="flex flex-col sm:flex-row gap-6 relative z-10">
                            <button onClick={handlePrevStep} className="flex-1 py-7 bg-slate-200 text-slate-700 rounded-[2rem] font-black text-2xl flex items-center justify-center gap-4 hover:bg-slate-300 active:scale-95 transition-all">
                                <ChevronLeft className="w-9 h-9" /> 이전
                            </button>
                          
                            {isRequiredStep ? (
                              <button onClick={() => copyToClipboard(currentPromptIdx === -1 ? getPersonaPrompt() : selectedTrack.prompts[currentPromptIdx].text(interests[selectedTrack.id] || ''))}
                                  className="flex-[2] py-7 bg-white border-4 border-indigo-600 text-indigo-600 rounded-[2rem] font-black text-2xl flex items-center justify-center gap-4 hover:bg-indigo-50 active:scale-95 transition-all shadow-xl">
                                  <Clipboard className="w-9 h-9" /> 질문 복사
                              </button>
                            ) : (
                              <button 
                                onClick={() => copyToClipboard(customQuestions[questionKey] || '')} 
                                disabled={!(customQuestions[questionKey] || '').trim()}
                                className="flex-[2] py-7 bg-white border-4 border-indigo-600 text-indigo-600 rounded-[2rem] font-black text-2xl flex items-center justify-center gap-4 hover:bg-indigo-50 active:scale-95 transition-all disabled:opacity-10 shadow-xl">
                                  <Clipboard className="w-9 h-9" /> 작성한 질문 복사
                              </button>
                            )}

                            <button onClick={handleNextStep} className="flex-[2] py-7 bg-indigo-600 text-white rounded-[2rem] font-black text-2xl flex items-center justify-center gap-4 hover:bg-indigo-700 hover:scale-[1.05] active:scale-95 transition-all shadow-2xl shadow-indigo-300">
                                다음 단계 <ChevronRight className="w-9 h-9" />
                            </button>
                        </div>
                    </div>
                </div>
            </section>
          </div>
        )}

        {/* STEP 5: Final Prompt (대화 내용 요약하기 단계) */}
        {step === 5 && (
          <div className="flex-1 flex flex-col items-center justify-center p-8 max-w-5xl mx-auto space-y-12 animate-in fade-in duration-1000 overflow-y-auto w-full bg-slate-50">
            <div className="text-center space-y-6">
              <div className="w-28 h-28 bg-indigo-600 text-white rounded-full flex items-center justify-center mx-auto shadow-[0_20px_50px_rgba(79,70,229,0.4)] animate-pulse">
                <Sparkles className="w-16 h-16" />
              </div>
              <h2 className="text-7xl font-black text-slate-900 tracking-tight leading-tight">대화 내용 요약하기</h2>
              <p className="text-2xl text-slate-600 font-bold leading-relaxed max-w-2xl mx-auto">마지막으로 아래 프롬프트를 대화창에 입력하면<span className="text-indigo-600 underline underline-offset-4 font-black"> 나만의 대화 요약본</span>이 완성됩니다.</p>
            </div>

            <div className="w-full bg-white border-4 border-indigo-600 rounded-[4rem] p-16 shadow-[0_40px_100px_-20px_rgba(79,70,229,0.25)] relative">
              <div className="space-y-10">
                <div className="flex items-center justify-between border-b-4 border-slate-50 pb-8">
                    <h4 className="text-sm font-black text-indigo-400 uppercase tracking-[0.4em] flex items-center gap-3">
                        <Clipboard className="w-7 h-7" /> Final Magic Prompt
                    </h4>
                    <button onClick={() => copyToClipboard('방금 대화 내용을 문단 구분없이 1000자 내외로 요약해줘.')}
                        className="flex items-center gap-3 text-indigo-700 font-black text-xl bg-indigo-100 px-10 py-5 rounded-[1.5rem] hover:bg-indigo-600 hover:text-white transition-all shadow-lg active:scale-95">
                        {copySuccess ? "COPIED!" : "전체 복사하기"}
                    </button>
                </div>
                <div className="text-slate-900 leading-[1.7] text-3xl whitespace-pre-wrap font-black p-12 bg-slate-50 rounded-[3rem] border-2 border-indigo-100 italic shadow-inner">
                    "방금 대화 내용을 문단 구분없이 1000자 내외로 요약해줘. 단, 과장해서 요약하지 말고 고등학교 수준에서 이해할 수 있는 내용으로 요약해줘"
                </div>
              </div>
            </div>

            <div className="flex gap-8 pt-6">
                <button onClick={() => setStep(4)} className="text-slate-500 hover:text-indigo-600 font-black flex items-center gap-4 text-xl transition-all hover:-translate-x-2">
                    <ChevronLeft className="w-8 h-8" /> 이전 단계로
                </button>
                <button onClick={() => setStep(6)} className="px-14 py-7 bg-slate-900 text-white rounded-[2rem] font-black text-2xl hover:bg-black transition-all flex items-center gap-4 shadow-2xl active:scale-95">
                    저장 및 제출 안내 <ChevronRight className="w-8 h-8" />
                </button>
            </div>
          </div>
        )}

        {/* STEP 6: Submission Guide - 대화 내용 요약 및 느낀점 제출 */}
        {step === 6 && (
          <div className="flex-1 flex flex-col items-center justify-center p-8 max-w-4xl mx-auto space-y-12 animate-in fade-in duration-700 overflow-y-auto w-full bg-white">
            <div className="text-center space-y-5">
              <div className="w-28 h-28 bg-green-100 text-green-600 rounded-[2.5rem] flex items-center justify-center mx-auto shadow-2xl border-4 border-white">
                <CheckCircle2 className="w-16 h-16" />
              </div>
              <h2 className="text-7xl font-black text-slate-900 tracking-tight">활동1: 대화 요약, 느낀점</h2>
              <p className="text-2xl text-slate-600 font-bold leading-relaxed">
                수고하셨습니다! 요약문과 느낀점을 정리하여 <span className="text-green-600">리로스쿨</span>에 제출해 주세요.
              </p>
            </div>

            <div className="w-full px-4">
              {/* 항목: 대화 내용 요약 및 느낀점 제출 */}
              <div className="bg-slate-50 border-4 border-indigo-200 p-12 rounded-[4rem] shadow-2xl space-y-8 relative overflow-hidden group hover:border-indigo-600 transition-colors">
                <div className="absolute top-0 right-0 p-8 opacity-5 group-hover:scale-125 transition-transform group-hover:opacity-10 text-indigo-600">
                    <FileText className="w-32 h-32" />
                </div>
                <div className="flex items-center gap-4 text-indigo-700 font-black text-3xl">
                  <div className="p-4 bg-white rounded-3xl shadow-md"><Save className="w-10 h-10" /></div>
                  <span>대화 내용 요약 및 느낀점 제출</span>
                </div>
                <div className="space-y-6">
                  <div className="text-slate-800 text-xl leading-relaxed font-bold space-y-4">
                    <p>1. 인공지능이 답해준 <span className="text-indigo-600">대화 요약본(1000자 내외)</span>을 복사합니다.</p>
                    <p>2. <span className="text-indigo-600">리로스쿨</span> {'->'} 포트폴리오 {'->'} 자율적 교육과정 과제함을 클릭합니다.</p>
                    <p>3. 1000자 요약 내용을 과제함 입력창에 <span className="text-indigo-600 font-black">직접 붙여넣어(Ctrl+V)</span> 넣으세요.</p>
                    <p>4. 이번 탐구 활동을 수행하며 새롭게 알게된 내용이나 깨닫게 된 <span className="text-indigo-600">느낀점을 200자 내외로 </span>을 진솔하게 작성하세요.</p>
                    <p>4. 느낀점 작성까지 마치면 제출하세요.</p>
                  </div>
                  <div className="p-6 bg-indigo-600 border-4 border-white rounded-[2rem] space-y-2 text-center shadow-lg group-hover:scale-[1.02] transition-transform">
                    <p className="font-black text-white text-3xl">고잔고등학교 리로스쿨 과제함 제출</p>
                    <p className="text-xs text-indigo-200 font-black uppercase tracking-[0.3em]">
                      Portfolio {'->'} Autonomous Curriculum Submission
                    </p>
                  </div>
                </div>
              </div>
            </div>

            <div className="flex flex-col items-center gap-10 pb-20 w-full pt-10">
                <div className="flex gap-6">
                  <button onClick={() => setStep(5)} className="text-slate-500 hover:text-indigo-600 font-black flex items-center gap-4 text-xl transition-all hover:-translate-x-2">
                    <ChevronLeft className="w-8 h-8" /> 이전 단계
                  </button>
                  <a href="https://gojan.riroschool.kr" target="_blank" rel="noreferrer"
                    className="px-14 py-6 bg-slate-900 text-white rounded-[2rem] font-black text-xl hover:bg-black transition-all shadow-2xl flex items-center gap-4 active:scale-95">
                    리로스쿨 바로가기 <ExternalLink className="w-8 h-8" />
                  </a>
                  <button onClick={() => setStep(7)} className="px-14 py-6 bg-indigo-600 text-white rounded-[2rem] font-black text-xl hover:bg-indigo-700 transition-all shadow-2xl shadow-indigo-200 flex items-center gap-4 active:scale-95">
                    다음 활동 진행 <ChevronRight className="w-8 h-8" />
                  </button>
                </div>
              
                <button onClick={handleRestart}
                    className="text-slate-400 hover:text-slate-900 font-black flex items-center gap-4 text-xl uppercase tracking-[0.3em] transition-all group">
                    <RefreshCw className="w-7 h-7 group-hover:rotate-180 transition-transform duration-700" /> 처음으로 돌아가기
                </button>
            </div>
          </div>
        )}

        {/* STEP 7: Activity 2 - NotebookLM Infographic Guide */}
        {step === 7 && (
          <div className="flex-1 flex flex-col items-center justify-center p-8 max-w-5xl mx-auto space-y-12 animate-in fade-in duration-700 overflow-y-auto w-full bg-white">
            <div className="text-center space-y-5">
              <div className="w-28 h-28 bg-indigo-100 text-indigo-600 rounded-[2.5rem] flex items-center justify-center mx-auto shadow-2xl border-4 border-white">
                <Sparkles className="w-16 h-16 animate-pulse" />
              </div>
              <h2 className="text-7xl font-black text-slate-900 tracking-tight">활동 2: 인포그래픽 생성</h2>
              <p className="text-2xl text-slate-600 font-bold leading-relaxed">
                구글 <span className="text-indigo-600">NotebookLM</span>의 자체 인포그래픽 자동 변환 기능을 활용하여 방금 요약한 대화 내용을 한눈에 들어오는 인포그래픽으로 즉시 변환해 보세요.
              </p>
            </div>

            <div className="w-full px-4 space-y-10">
              {/* 안내 가이드 카드 */}
              <div className="bg-slate-50 border-4 border-indigo-200 p-12 rounded-[4rem] shadow-2xl space-y-8 relative overflow-hidden group hover:border-indigo-600 transition-colors">
                <div className="absolute top-0 right-0 p-8 opacity-5 group-hover:scale-125 transition-transform group-hover:opacity-10 text-indigo-600">
                    <FileText className="w-32 h-32" />
                </div>
                <div className="flex items-center gap-4 text-indigo-700 font-black text-3xl">
                  <div className="p-4 bg-white rounded-3xl shadow-md"><Info className="w-10 h-10" /></div>
                  <span>NotebookLM 진행 순서 및 방법</span>
                </div>
                <div className="text-slate-800 text-xl leading-relaxed font-bold space-y-6">
                  <p>1. 아래 <span className="text-indigo-600">노트북LM 바로가기</span> 버튼을 눌러 사이트에 접속한 뒤 구글 로그인합니다.</p>
                  <p>2. <b>오른쪽 상단 '새로 만들기'</b>를 클릭하고, 소스 추가 메뉴에서 <b>'복사된 텍스트'</b>를 선택합니다.</p>
                  <p>3. 요약된 1000자 붙여넣고, <b>'삽입'</b>를 클릭합니다.</p>
                  <p>4. 오른쪽 스튜디오 인포그래픽에서 화살표를 누르고 <b>'세로모드로 설정'</b> 합니다.</p>
                  <p>5. <b>'인포그래픽'</b> 버튼을 눌러 시각화 자료를 즉시 자동 생성합니다.</p>
                  <p>5-1. 만약! 구글 로그인이 안된다면 인공지능 사이트 대화창 밑에 이미지 버튼을 클릭하고 <b>'1000자로 요약한 대화 내용을 바탕으로 한글로 된 세로형 인포그래픽 그려줘'</b>라고 명령하고 인포그래픽을 만들어 보세요.</p>
                  <p>6. <span className="text-indigo-600">제출방법!!</span> 학급 단톡방에 공유된 구글 슬라이드 링크에 본인 번호 슬라이드에 붙여 넣어서 제출해주세요.</p>
                </div>
              </div>
            </div>

            <div className="flex flex-col items-center gap-10 pb-20 w-full pt-10">
                <div className="flex gap-8 w-full max-w-4xl justify-center">
                    <button onClick={() => setStep(6)} className="px-10 py-6 bg-slate-200 text-slate-700 rounded-[2rem] font-black text-2xl hover:bg-slate-300 active:scale-95 transition-all">
                        이전 단계로
                    </button>
                    <a href="https://notebooklm.google.com" target="_blank" rel="noreferrer"
                      className="px-12 py-6 bg-indigo-600 text-white rounded-[2rem] font-black text-2xl hover:bg-indigo-700 transition-all shadow-2xl shadow-indigo-200 flex items-center gap-4 hover:-translate-y-1 active:scale-95">
                      노트북LM 바로가기 <ExternalLink className="w-8 h-8" />
                    </a>
                </div>
              
                <button onClick={handleRestart}
                    className="text-slate-400 hover:text-slate-900 font-black flex items-center gap-4 text-xl uppercase tracking-[0.3em] transition-all group">
                    <RefreshCw className="w-7 h-7 group-hover:rotate-180 transition-transform duration-700" /> 처음으로 돌아가기
                </button>
            </div>
          </div>
        )}
      </main>

      {/* Global Toast */}
      {copySuccess && (
        <div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-900 text-white px-12 py-8 rounded-[2.5rem] shadow-[0_30px_60px_-10px_rgba(0,0,0,0.5)] flex items-center gap-6 animate-in fade-in duration-200 z-[100] border-4 border-slate-700 ring-8 ring-slate-900/10">
          <div className="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center shadow-lg shadow-green-500/40">
            <CheckCircle2 className="w-8 h-8 text-white font-black" />
          </div>
          <div>
              <p className="font-black text-5xl tracking-tight text-white">복사 성공!</p>
              <p className="text-2xl text-slate-400 font-bold mt-4">인공지능 대화창에 붙여넣으세요 (Ctrl+V)</p>
          </div>
        </div>
      )}
    </div>
  );
}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
